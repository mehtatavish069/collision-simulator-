<!DOCTYPE html>
<html>
<head>
  <title>Collision Simulator</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Source+Sans+Pro:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Source Sans Pro', sans-serif;
      background-color: #ede0d4;
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: #3e2723;
    }
    .container {
      background-color: #fafafa;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      max-width: 800px;
      width: 100%;
      border: 1px solid #d7ccc8;
    }
    h2 {
      font-family: 'Playfair Display', serif;
      text-align: center;
      color: #3e2723;
      margin-bottom: 30px;
      font-weight: 700;
      letter-spacing: 1px;
      text-shadow: 0 1px 2px rgba(0,0,0,0.1);
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      margin-bottom: 30px;
      justify-content: center;
    }
    .control-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      background-color: #f5f5f5;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
      min-width: 120px;
    }
    label {
      margin-bottom: 8px;
      font-weight: 600;
      color: #5d4037;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    input, select {
      padding: 8px 12px;
      border: 2px solid #d7ccc8;
      border-radius: 6px;
      width: 100px;
      font-family: 'Source Sans Pro', sans-serif;
      font-size: 14px;
      background-color: #ffffff;
      transition: border-color 0.3s ease;
    }
    input:focus, select:focus {
      outline: none;
      border-color: #8d6e63;
    }
    button {
      padding: 12px 24px;
      background-color: #8d6e63;
      color: #fafafa;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
      font-family: 'Source Sans Pro', sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      transition: all 0.3s ease;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }
    button:hover {
      background-color: #6d4c41;
      transform: translateY(-2px);
      box-shadow: 0 6px 12px rgba(0,0,0,0.15);
    }
    #resetBtn {
      background-color: #bcaaa4;
    }
    #resetBtn:hover {
      background-color: #a1887f;
    }
    canvas {
      border: 3px solid #8d6e63;
      background: linear-gradient(to bottom, #d7ccc8, #bcaaa4);
      display: block;
      margin: 0 auto;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }
    .info {
      text-align: center;
      margin-top: 30px;
      font-size: 16px;
      color: #5d4037;
      font-weight: 400;
      background-color: #f5f5f5;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }
    .velocity {
      font-weight: 600;
      transition: color 0.3s ease;
    }
    .velocity.final {
      color: #ff6f00;
      font-weight: 700;
      text-shadow: 0 1px 2px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Collision Simulator</h2>
    <div class="controls">
      <div class="control-group">
        <label for="collisionType">Collision Type:</label>
        <select id="collisionType">
          <option value="elastic">Elastic</option>
          <option value="inelastic">Inelastic</option>
        </select>
      </div>
      <div class="control-group">
        <label for="mass1">Mass 1:</label>
        <input type="number" id="mass1" value="1" min="0.1" step="0.1">
      </div>
      <div class="control-group">
        <label for="vel1">Velocity 1:</label>
        <input type="number" id="vel1" value="5" step="0.1">
      </div>
      <div class="control-group">
        <label for="mass2">Mass 2:</label>
        <input type="number" id="mass2" value="1" min="0.1" step="0.1">
      </div>
      <div class="control-group">
        <label for="vel2">Velocity 2:</label>
        <input type="number" id="vel2" value="0" step="0.1">
      </div>
      <div class="control-group">
        <button onclick="startSimulation()">Start Simulation</button>
      </div>
      <div class="control-group">
        <button id="resetBtn" onclick="resetSimulation()">Reset</button>
      </div>
    </div>
    
    <canvas id="canvas" width="600" height="200"></canvas>
    
    <div class="info">
      <p>Gold ball velocity: <span id="vel1Display" class="velocity">5</span> | Silver ball velocity: <span id="vel2Display" class="velocity">0</span></p>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const vel1Display = document.getElementById("vel1Display");
    const vel2Display = document.getElementById("vel2Display");

    let ball1, ball2, collisionType, animationId, collided = false;

    function startSimulation() {
      const m1 = parseFloat(document.getElementById("mass1").value);
      const v1 = parseFloat(document.getElementById("vel1").value);
      const m2 = parseFloat(document.getElementById("mass2").value);
      const v2 = parseFloat(document.getElementById("vel2").value);
      collisionType = document.getElementById("collisionType").value;

      ball1 = { x: 100, y: 100, r: 20, m: m1, v: v1 };
      ball2 = { x: 400, y: 100, r: 20, m: m2, v: v2 };
      collided = false;

      if (animationId) cancelAnimationFrame(animationId);
      update();
    }

    function resetSimulation() {
      if (animationId) cancelAnimationFrame(animationId);
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      vel1Display.textContent = document.getElementById("vel1").value;
      vel2Display.textContent = document.getElementById("vel2").value;
      vel1Display.classList.remove('final');
      vel2Display.classList.remove('final');
      collided = false;
    }

    function update() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Move balls
      ball1.x += ball1.v;
      ball2.x += ball2.v;

      // Draw balls
      ctx.beginPath();
      ctx.arc(ball1.x, ball1.y, ball1.r, 0, Math.PI * 2);
      ctx.fillStyle = "#ffd700";
      ctx.fill();
      ctx.strokeStyle = "#b8860b";
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.closePath();

      ctx.beginPath();
      ctx.arc(ball2.x, ball2.y, ball2.r, 0, Math.PI * 2);
      ctx.fillStyle = "#c0c0c0";
      ctx.fill();
      ctx.strokeStyle = "#808080";
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.closePath();

      // Update velocity display
      vel1Display.textContent = ball1.v.toFixed(2);
      vel2Display.textContent = ball2.v.toFixed(2);

      // Collision detection
      if (!collided && Math.abs(ball1.x - ball2.x) <= ball1.r + ball2.r) {
        collided = true;
        if (collisionType === "elastic") {
          // Elastic collision formula
          const u1 = ball1.v, u2 = ball2.v;
          const m1 = ball1.m, m2 = ball2.m;

          ball1.v = ((m1 - m2) / (m1 + m2)) * u1 + ((2 * m2) / (m1 + m2)) * u2;
          ball2.v = ((2 * m1) / (m1 + m2)) * u1 + ((m2 - m1) / (m1 + m2)) * u2;
        } else {
          // Perfectly inelastic collision (stick together)
          const vFinal = (ball1.m * ball1.v + ball2.m * ball2.v) / (ball1.m + ball2.m);
          ball1.v = vFinal;
          ball2.v = vFinal;
        }
        vel1Display.classList.add('final');
        vel2Display.classList.add('final');
      }

      animationId = requestAnimationFrame(update);
    }
  </script>
</body>
</html>
